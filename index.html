<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, interactive-widget=resizes-content">
<title>Memo</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Memo">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="theme-color" content="#f7f7f8" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#1e1e1e" media="(prefers-color-scheme: dark)">
<style>
:root{
  --bg:#f7f7f8; --card:#fff; --text:#333; --sub:#9a9aa0; --border:#e4e4e7;
  --accent:#7c5cfa; --tag:#5b7c99; --err:#c25050; --ok:#4c9a5f;
}
@media (prefers-color-scheme: dark){
  :root{ --bg:#1e1e1e; --card:#262626; --text:#dcdcdc; --sub:#8a8a8a; --border:#3a3a3a;
    --accent:#8f76ff; --tag:#7fa3c4; --err:#d47676; --ok:#6fbf83; }
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;overscroll-behavior:none;position:fixed;width:100%;top:0;left:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;background:var(--bg);color:var(--text);font-size:15px;line-height:1.7}
#app{height:100dvh;max-width:640px;margin:0 auto;display:flex;flex-direction:column}
header{display:flex;align-items:center;gap:2px;flex-shrink:0;padding:calc(6px + env(safe-area-inset-top)) 6px 6px 16px;border-bottom:1px solid var(--border)}
header h1{font-size:15px;font-weight:600;flex:1;display:flex;align-items:center;gap:8px}
#dot{width:8px;height:8px;border-radius:50%;background:var(--sub)}
#dot.on{background:var(--ok)}
.hbtn{border:none;background:none;color:var(--sub);width:44px;height:44px;display:grid;place-items:center;cursor:pointer}
.hbtn svg{width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.hbtn.spin svg{animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 14px;overscroll-behavior:contain}
#ptr{height:0;overflow:hidden;display:flex;align-items:flex-end;justify-content:center;color:var(--sub);font-size:12px;transition:height .2s}
#ptr.pulling{transition:none}
.dayhead{position:sticky;top:0;z-index:5;text-align:center;padding:10px 0 6px;background:var(--bg);font-size:12px;color:var(--sub)}
.memo{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:9px 13px;margin-bottom:8px}
.mhead{display:flex;align-items:center;gap:8px;font-size:11.5px;color:var(--sub);margin-bottom:2px}
.mhead .pend{color:var(--err)}
.mbody{word-break:break-word;font-size:14.5px}
.mbody .tag{color:var(--tag)}
.mbody .todo{color:var(--sub)}
.mbody a{color:var(--tag)}
.mbody .tl{white-space:pre-wrap}
.mbody .bq{border-left:3px solid var(--sub);padding-left:9px;margin:2px 0;color:var(--sub);white-space:pre-wrap}
.mbody .bl{margin:2px 0;padding-left:20px}
.mbody .bl .bl{margin:0}
.mbody .bl li{white-space:pre-wrap}
.mbody .bl li.ct,.mbody .bl li.cb{list-style:none}
.mbody .ck{color:var(--sub)}
.mbody .hd{font-weight:600;margin:2px 0}
.mbody .hd.h1{font-size:1.15em}
.mbody .hd.h2{font-size:1.08em}
.mbody code{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:.9em;background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:0 4px}
.mbody del{color:var(--sub)}
.empty{text-align:center;color:var(--sub);padding:44px 0;font-size:13px}
#bottomPad{height:8px}
.banner{display:none;align-items:center;gap:8px;margin:10px 0;padding:9px 12px;background:var(--card);border:1px solid var(--border);border-radius:8px;font-size:12.5px;color:var(--sub)}
.banner.show{display:flex}
.banner .re{margin-left:auto;border:1px solid var(--border);background:none;color:var(--text);border-radius:6px;padding:4px 12px;font-size:12px;font-family:inherit;cursor:pointer}
.composer{flex-shrink:0;border-top:1px solid var(--border);background:var(--bg);padding:8px 10px calc(8px + env(safe-area-inset-bottom))}
.suggest{display:none;flex-wrap:wrap;gap:6px;padding:0 2px 8px}
.suggest.open{display:flex}
.suggest button{border:1px solid var(--border);background:var(--card);color:var(--tag);border-radius:14px;padding:4px 12px;font-size:13px;font-family:inherit;cursor:pointer;min-height:30px}
.bar{display:flex;align-items:flex-end;gap:6px}
.ibtn{flex-shrink:0;border:none;background:none;color:var(--sub);cursor:pointer;width:40px;height:40px;display:grid;place-items:center;font-size:18px;font-family:inherit}
.ibtn.on{color:var(--accent)}
.ibtn svg{width:20px;height:20px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.inputwrap{flex:1;background:var(--card);border:1px solid var(--border);border-radius:18px;padding:7px 14px;display:flex;align-items:center}
textarea{width:100%;border:none;outline:none;background:transparent;resize:none;font:inherit;color:var(--text);line-height:1.55;max-height:132px;display:block}
textarea::placeholder{color:var(--sub);opacity:.7}
.send{flex-shrink:0;border:none;background:var(--accent);color:#fff;cursor:pointer;width:40px;height:40px;border-radius:50%;display:grid;place-items:center}
.send:disabled{opacity:.4}
.send svg{width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.scrim{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:30;opacity:0;pointer-events:none;transition:opacity .2s}
.scrim.open{opacity:1;pointer-events:auto}
.sheet{position:fixed;left:0;right:0;bottom:0;z-index:31;max-width:640px;margin:0 auto;background:var(--card);border:1px solid var(--border);border-bottom:none;border-radius:12px 12px 0 0;padding:18px 18px calc(26px + env(safe-area-inset-bottom));transform:translateY(105%);transition:transform .25s ease;max-height:85dvh;overflow-y:auto}
.sheet.open{transform:none}
.sheet h2{font-size:14px;margin-bottom:4px}
.sheet .note{font-size:12px;color:var(--sub);margin-bottom:10px}
.sheet label{display:block;font-size:12px;color:var(--sub);margin:10px 0 4px}
.sheet input,.sheet textarea{width:100%;border:1px solid var(--border);border-radius:6px;background:var(--bg);padding:9px 10px;font-size:14px;color:var(--text);font-family:inherit;outline:none;resize:none}
.sheet .save{margin-top:16px;width:100%;border:none;background:var(--accent);color:#fff;font-size:13px;font-weight:600;font-family:inherit;padding:12px;border-radius:8px;cursor:pointer}
.toast{position:fixed;top:calc(14px + env(safe-area-inset-top));left:50%;transform:translate(-50%,-10px);background:var(--text);color:var(--bg);padding:8px 16px;border-radius:6px;font-size:12.5px;opacity:0;transition:all .25s;z-index:40;pointer-events:none;max-width:86vw;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.toast.show{opacity:1;transform:translate(-50%,0)}
</style>
</head>
<body>
<div id="app">
  <header>
    <h1><span id="dot"></span>Memo</h1>
    <button class="hbtn" id="btnRefresh" aria-label="更新">
      <svg viewBox="0 0 24 24"><path d="M20 12a8 8 0 1 1-2.3-5.6M20 3v5h-5"/></svg>
    </button>
    <button class="hbtn" id="btnSettings" aria-label="設定">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.6 1.6 0 0 0 .3 1.7l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.6 1.6 0 0 0-1.7-.3 1.6 1.6 0 0 0-1 1.5V21a2 2 0 1 1-4 0v-.1a1.6 1.6 0 0 0-1-1.5 1.6 1.6 0 0 0-1.7.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.6 1.6 0 0 0 .3-1.7 1.6 1.6 0 0 0-1.5-1H3a2 2 0 1 1 0-4h.1a1.6 1.6 0 0 0 1.5-1 1.6 1.6 0 0 0-.3-1.7l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.6 1.6 0 0 0 1.7.3h.1a1.6 1.6 0 0 0 1-1.5V3a2 2 0 1 1 4 0v.1a1.6 1.6 0 0 0 1 1.5h.1a1.6 1.6 0 0 0 1.7-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.6 1.6 0 0 0-.3 1.7v.1a1.6 1.6 0 0 0 1.5 1H21a2 2 0 1 1 0 4h-.1a1.6 1.6 0 0 0-1.5 1z"/></svg>
    </button>
  </header>

  <div id="scroll">
    <div id="ptr">離して更新</div>
    <div class="banner" id="banner"><span id="bannerText">未接続 — メモは端末に保存され、後で送信されます</span><button class="re" id="btnReconnect">再接続</button></div>
    <div id="timeline"></div>
    <div id="bottomPad"></div>
  </div>

  <div class="composer">
    <div class="suggest" id="suggest"></div>
    <div class="bar">
      <button class="ibtn" id="btnTodo" aria-label="TODOとして送信">
        <svg viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="16" rx="3"/><path d="M9 12l2.2 2.2L15.5 9.5"/></svg>
      </button>
      <div class="inputwrap"><textarea id="input" rows="1" placeholder="What do you think now..."></textarea></div>
      <button class="send" id="btnSend" disabled aria-label="送信">
        <svg viewBox="0 0 24 24"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
      </button>
    </div>
  </div>

  <div class="scrim" id="scrim"></div>
  <div class="sheet" id="sheet">
    <h2>設定</h2>
    <p class="note">Obsidianプラグインのローカルサーバー（HTTPS）に直接書き込みます。メモはクラウドを経由しません。オフライン時は端末に保存され、接続できたとき自動送信されます。</p>
    <label>サーバーURL（例: https://cntmac801.local:8928）</label>
    <input id="cfgBase" placeholder="https://xxxxx.local:8928" autocapitalize="off" autocorrect="off" inputmode="url">
    <label>接続トークン</label>
    <input id="cfgToken" type="password" placeholder="プラグイン設定からコピー" autocapitalize="off" autocorrect="off">
    <label>タグ（改行区切り。#入力時の候補）</label>
    <textarea id="cfgTags" rows="4" autocapitalize="off" autocorrect="off"></textarea>
    <button class="save" id="btnSave">保存して接続確認</button>
  </div>

  <div class="toast" id="toast"></div>
</div>

<script>
const $ = s => document.querySelector(s);
const LS = { get:(k,d)=>{try{return JSON.parse(localStorage.getItem(k))??d}catch{return d}}, set:(k,v)=>localStorage.setItem(k,JSON.stringify(v)) };
let cfg   = LS.get('cfg', { base:'', token:'' });
let tags  = LS.get('tags', ['タスク','toai','雑談']);
let queue = LS.get('queue', []);
let todo  = false;
let connected = false;
let inboxCache = [];
const WD = ['日','月','火','水','木','金','土'];

function uuid(){if(crypto.randomUUID)return crypto.randomUUID();const b=crypto.getRandomValues(new Uint8Array(16));b[6]=(b[6]&0x0f)|0x40;b[8]=(b[8]&0x3f)|0x80;const h=[...b].map(x=>x.toString(16).padStart(2,'0'));return `${h.slice(0,4).join('')}-${h.slice(4,6).join('')}-${h.slice(6,8).join('')}-${h.slice(8,10).join('')}-${h.slice(10,16).join('')}`;}
function nowISO(){const d=new Date(),p=n=>String(n).padStart(2,'0');const o=-d.getTimezoneOffset(),s=o>=0?'+':'-',a=Math.abs(o);return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}T${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())}${s}${p(a/60|0)}:${p(a%60)}`;}
function today(){return nowISO().slice(0,10)}
function esc(s){return s.replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function toast(m){const t=$('#toast');t.textContent=m;t.classList.add('show');clearTimeout(t._h);t._h=setTimeout(()=>t.classList.remove('show'),2600);}
function scrollBottom(){const s=$('#scroll');s.scrollTop=s.scrollHeight;}
function nearBottom(){const s=$('#scroll');return s.scrollHeight-s.scrollTop-s.clientHeight<120;}
function saveQueue(){LS.set('queue',queue);}

/* ---------- API（設定したローカルHTTPSサーバー） ---------- */
function api(path,opt={}){
  const base=(cfg.base||'').replace(/\/$/,'');
  return fetch(base+path,{...opt,headers:{'X-Memo-Token':cfg.token,...(opt.body?{'Content-Type':'application/json'}:{})}});
}
async function ping(){
  if(!cfg.base||!cfg.token){connected=false;}
  else{try{const r=await api('/ping');connected=r.ok;}catch(e){connected=false;}}
  $('#dot').classList.toggle('on',connected);
  $('#banner').classList.toggle('show',!connected&&(queue.length>0||!cfg.base));
  return connected;
}
async function postMemo(m){const r=await api('/memo',{method:'POST',body:JSON.stringify({content:m.content,task:m.task,createdAt:m.createdAt})});if(!r.ok)throw new Error(`API ${r.status}`);}

/* ---------- 送信・保留（オフラインでも必ず端末に残す） ---------- */
async function send(){
  const text=$('#input').value.trim();
  if(!text)return;
  const m={id:uuid(),createdAt:nowISO(),content:text,task:todo};
  const clear=()=>{const ta=$('#input');ta.value='';ta.style.height='auto';todo=false;$('#btnTodo').classList.remove('on');harvestTags(text);updateSend();renderSuggest();};
  // まず端末キューに積む（確実に残す）
  queue.push(m); saveQueue(); clear(); render(); scrollBottom();
  // 送れるなら即送信
  try{ await postMemo(m); queue=queue.filter(x=>x.id!==m.id); saveQueue(); await refresh(); toast('Obsidianに書き込みました'); }
  catch(e){ await ping(); render(); toast('未接続 — 端末に保存しました（↻で送信）'); }
}
async function flushQueue(){let n=0;while(queue.length){try{await postMemo(queue[0]);queue.shift();saveQueue();n++;}catch(e){break;}}return n;}

async function refresh(){
  const btn=$('#btnRefresh');btn.classList.add('spin');
  const ok=await ping();
  if(ok){
    const n=await flushQueue();
    if(n)toast(`保存していた${n}件を送信しました`);
    try{const r=await api(`/inbox?date=${today()}`);const j=await r.json();inboxCache=j.memos||[];}catch(e){inboxCache=[];}
  }
  render();
  btn.classList.remove('spin');
}

/* ---------- tags ---------- */
function harvestTags(text){const f=[...String(text).matchAll(/#([^\s#]+)/g)].map(m=>m[1]);for(const t of f)tags=[t,...tags.filter(x=>x!==t)];tags=tags.slice(0,30);LS.set('tags',tags);}
function activeToken(){const ta=$('#input');const b=ta.value.slice(0,ta.selectionStart??ta.value.length);const m=b.match(/(^|[\s　])#([^\s　#]*)$/);return m?{query:m[2],start:b.length-m[2].length-1}:null;}
function renderSuggest(){
  const box=$('#suggest');const tok=activeToken();
  if(!tok){box.classList.remove('open');box.innerHTML='';return;}
  const q=tok.query;const hits=tags.filter(t=>t!==q&&(q===''||t.toLowerCase().includes(q.toLowerCase()))).slice(0,8);
  if(!hits.length){box.classList.remove('open');box.innerHTML='';return;}
  box.innerHTML='';
  for(const t of hits){const b=document.createElement('button');b.textContent=`#${t}`;b.onmousedown=e=>e.preventDefault();b.onclick=()=>insertTag(t);box.appendChild(b);}
  box.classList.add('open');
}
function insertTag(t){const ta=$('#input');const tok=activeToken();if(!tok)return;const c=ta.selectionStart??ta.value.length;ta.value=ta.value.slice(0,tok.start)+`#${t} `+ta.value.slice(c);const p=tok.start+t.length+2;ta.focus();ta.setSelectionRange(p,p);updateSend();renderSuggest();}

/* ---------- render（古い順・最新が下） ---------- */
/* カードの記法整形はChrome拡張（sidepanel.js）と同一ロジック */
function inlineFmt(s){
  let h=esc(s);
  h=h.replace(/`([^`\n]+)`/g,'<code>$1</code>');
  h=h.replace(/\[([^\]]*)\]\((https?:[^\s)]+)\)/g,(_,t,u)=>`<a href="${u}" target="_blank" rel="noopener">${t||u}</a>`);
  h=h.replace(/\*\*([^*\n]+)\*\*/g,'<strong>$1</strong>');
  h=h.replace(/~~([^~\n]+)~~/g,'<del>$1</del>');
  h=h.replace(/(^|[\s　>])#([^\s#<]+)/g,`$1<span class="tag">#$2</span>`);
  return h;
}
const LIST_RE=/^([-*+]|\d+[.)])\s+(?:\[([ xX])\]\s*)?(.*)$/;
function parseLine(raw){
  const ind=raw.match(/^[\t ]*/)[0];
  let level=0,run=0;
  for(const ch of ind){ if(ch==='\t'){level++;run=0;} else if(++run===2){level++;run=0;} }
  return {level,rest:raw.slice(ind.length),raw};
}
function renderList(items){
  let html='';const stack=[];
  for(const it of items){
    const tag=it.ordered?'ol':'ul';
    while(stack.length>it.level+1)html+=`</li></${stack.pop()}>`;
    if(stack.length===it.level+1&&stack[stack.length-1]!==tag)html+=`</li></${stack.pop()}>`;
    if(stack.length===it.level+1){html+='</li>';}
    else{while(stack.length<it.level+1){html+=`<${tag} class="bl"${it.ordered&&it.num>1?` start="${it.num}"`:''}>`;stack.push(tag);if(stack.length<it.level+1)html+='<li class="ct">';}}
    html+=`<li${it.check?' class="cb"':''}>${it.check?`<span class="ck">${it.done?'☑':'☐'}</span> `:''}${it.html}`;
  }
  while(stack.length)html+=`</li></${stack.pop()}>`;
  return html;
}
function fmtBody(s,task){
  const lines=String(s).split('\n').map(parseLine);
  let out='',i=0;
  let todo=task?'<span class="todo">☐</span> ':'';
  if(todo&&lines[0]&&(/^>\s?/.test(lines[0].rest)||/^#{1,6}\s/.test(lines[0].rest)||LIST_RE.test(lines[0].rest))){out+='<div class="tl"><span class="todo">☐</span></div>';todo='';}
  while(i<lines.length){
    const {rest}=lines[i];let m;
    if(/^>\s?/.test(rest)){
      const buf=[];
      while(i<lines.length&&/^>\s?/.test(lines[i].rest)){buf.push(inlineFmt(lines[i].rest.replace(/^>\s?/,'')));i++;}
      out+=`<div class="bq">${buf.join('\n')}</div>`;
    }else if(m=rest.match(/^(#{1,6})\s+(.*)$/)){
      out+=`<div class="hd h${m[1].length}">${inlineFmt(m[2])}</div>`;i++;
    }else if(LIST_RE.test(rest)){
      const items=[];
      while(i<lines.length&&(m=lines[i].rest.match(LIST_RE))){
        items.push({level:lines[i].level,ordered:/^\d/.test(m[1]),num:parseInt(m[1],10)||0,check:m[2]!==undefined,done:/x/i.test(m[2]||''),html:inlineFmt(m[3])});
        i++;
      }
      out+=renderList(items);
    }else{
      out+=`<div class="tl">${todo+inlineFmt(lines[i].raw)||'&nbsp;'}</div>`;
      todo='';i++;
    }
  }
  return out;
}
function card(time,content,task,pending){const el=document.createElement('div');el.className='memo';el.innerHTML=`<div class="mhead"><span>${time}</span>${pending?'<span class="pend">送信待ち</span>':''}</div><div class="mbody">${fmtBody(content,task)}</div>`;return el;}
function render(){
  const tl=$('#timeline');tl.innerHTML='';
  const items=[...inboxCache.map(m=>({time:m.time,content:m.content,task:m.task,pending:false})),
    ...queue.map(m=>({time:m.createdAt.slice(11,16),content:m.content,task:m.task,pending:true}))];
  if(!items.length){tl.innerHTML=`<div class="empty">今日のメモはまだありません</div>`;return;}
  const h=document.createElement('div');h.className='dayhead';const d=new Date(today()+'T00:00:00');h.textContent=`${d.getMonth()+1}月${d.getDate()}日（${WD[d.getDay()]}）`;tl.appendChild(h);
  for(const m of items)tl.appendChild(card(m.time,m.content,m.task,m.pending));
}

/* ---------- composer UI ---------- */
function updateSend(){$('#btnSend').disabled=!$('#input').value.trim();}
$('#input').addEventListener('input',e=>{updateSend();renderSuggest();e.target.style.height='auto';e.target.style.height=Math.min(e.target.scrollHeight,132)+'px';});
$('#input').addEventListener('click',renderSuggest);
$('#input').addEventListener('focus',()=>setTimeout(scrollBottom,300));
$('#btnSend').onclick=send;
$('#btnTodo').onclick=()=>{todo=!todo;$('#btnTodo').classList.toggle('on',todo);};
$('#btnRefresh').onclick=refresh;
$('#btnReconnect').onclick=refresh;

/* ---------- pull to refresh ---------- */
(()=>{const sc=$('#scroll'),ptr=$('#ptr');let sy=null,pull=0;const TH=64;
  sc.addEventListener('touchstart',e=>{sy=sc.scrollTop<=0?e.touches[0].clientY:null;pull=0;},{passive:true});
  sc.addEventListener('touchmove',e=>{if(sy===null)return;pull=Math.max(0,(e.touches[0].clientY-sy)*.5);if(pull>0){ptr.classList.add('pulling');ptr.style.height=Math.min(pull,90)+'px';ptr.textContent=pull>=TH?'離して更新':'引っ張って更新';}},{passive:true});
  sc.addEventListener('touchend',()=>{ptr.classList.remove('pulling');ptr.style.height='0px';if(pull>=TH)refresh();sy=null;pull=0;});
})();

/* ---------- iOSキーボード対応 ---------- */
if(window.visualViewport){
  const vv=window.visualViewport,app=$('#app'),sheet=$('#sheet');
  const fit=()=>{const wb=nearBottom();app.style.height=vv.height+'px';const kb=Math.max(0,window.innerHeight-vv.height-vv.offsetTop);sheet.style.bottom=kb+'px';sheet.style.maxHeight=(vv.height-24)+'px';window.scrollTo(0,0);if(wb)scrollBottom();};
  vv.addEventListener('resize',fit);vv.addEventListener('scroll',fit);fit();
}

/* ---------- settings ---------- */
function openSheet(){$('#cfgBase').value=cfg.base;$('#cfgToken').value=cfg.token;$('#cfgTags').value=tags.join('\n');$('#scrim').classList.add('open');$('#sheet').classList.add('open');}
function closeSheet(){$('#scrim').classList.remove('open');$('#sheet').classList.remove('open');}
$('#btnSettings').onclick=openSheet;
$('#scrim').onclick=closeSheet;
$('#btnSave').onclick=async()=>{
  cfg={base:$('#cfgBase').value.trim().replace(/\/$/,''),token:$('#cfgToken').value.trim()};LS.set('cfg',cfg);
  tags=$('#cfgTags').value.split('\n').map(t=>t.trim().replace(/^#/,'')).filter(Boolean).slice(0,30);LS.set('tags',tags);
  closeSheet();await refresh();
  toast(connected?'接続しました':'接続できません — URL・トークン・証明書を確認');
};

/* ---------- init ---------- */
render();updateSend();
(async()=>{await refresh();if(!cfg.base||!cfg.token)setTimeout(openSheet,400);})();
if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
</script>
</body>
</html>
